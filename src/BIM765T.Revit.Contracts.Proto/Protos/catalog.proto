syntax = "proto3";

option csharp_namespace = "BIM765T.Revit.Contracts.Proto";

package bim765t.worker.v2;

import "common.proto";

message CatalogRequest {
  EnvelopeMetadata meta = 1;
}

message ToolSummary {
  string tool_name = 1;
  string description = 2;
  bool enabled = 3;
  bool supports_dry_run = 4;
  bool mutates_model = 5;
  int32 execution_timeout_ms = 6;
  string permission_level = 7;
  string approval_requirement = 8;
  repeated string risk_tags = 9;
}

message CatalogReply {
  StatusEnvelope status = 1;
  repeated ToolSummary tools = 2;
  string payload_json = 3;
}

message CapabilitiesReply {
  StatusEnvelope status = 1;
  string payload_json = 2;
}

message RuntimeHealthReply {
  StatusEnvelope status = 1;
  string payload_json = 2;
}

service CatalogService {
  rpc ListTools(CatalogRequest) returns (CatalogReply);
  rpc GetCapabilities(CatalogRequest) returns (CapabilitiesReply);
  rpc GetRuntimeHealth(CatalogRequest) returns (RuntimeHealthReply);
}
