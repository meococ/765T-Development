syntax = "proto3";

option csharp_namespace = "BIM765T.Revit.Contracts.Proto";

package bim765t.worker.v2;

message KernelInvokeRequest {
  string correlation_id = 1;
  string causation_id = 2;
  string mission_id = 3;
  string actor_id = 4;
  string document_key = 5;
  string requested_at_utc = 6;
  int32 timeout_ms = 7;
  string cancellation_token_id = 8;
  string request_id = 9;
  string tool_name = 10;
  string payload_json = 11;
  string caller = 12;
  string session_id = 13;
  bool dry_run = 14;
  string target_document = 15;
  string target_view = 16;
  string expected_context_json = 17;
  string approval_token = 18;
  string scope_descriptor_json = 19;
  string preview_run_id = 20;
}

message KernelInvokeResponse {
  string request_id = 1;
  string tool_name = 2;
  bool succeeded = 3;
  string status_code = 4;
  string payload_json = 5;
  repeated string diagnostics = 6;
  bool confirmation_required = 7;
  string approval_token = 8;
  string diff_summary_json = 9;
  string review_summary_json = 10;
  repeated int32 changed_ids = 11;
  repeated string artifacts = 12;
  int64 duration_ms = 13;
  string preview_run_id = 14;
  string correlation_id = 15;
  string protocol_version = 16;
}
