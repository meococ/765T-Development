<svg width="1600" height="720" viewBox="0 0 1600 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">BIM765T Revit Bridge Platform</title>
  <desc id="desc">Hero banner for BIM765T Revit Bridge Platform README.</desc>
  <defs>
    <linearGradient id="bg" x1="134" y1="58" x2="1460" y2="670" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.5" stop-color="#0D2441"/>
      <stop offset="1" stop-color="#071B32"/>
    </linearGradient>
    <linearGradient id="accent" x1="235" y1="120" x2="1320" y2="578" gradientUnits="userSpaceOnUse">
      <stop stop-color="#36C2FF"/>
      <stop offset="0.55" stop-color="#6D7CFF"/>
      <stop offset="1" stop-color="#8A5CFF"/>
    </linearGradient>
    <filter id="blur" x="0" y="0" width="1600" height="720" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
  </defs>

  <rect width="1600" height="720" rx="28" fill="url(#bg)"/>
  <g opacity="0.45" filter="url(#blur)">
    <circle cx="300" cy="170" r="120" fill="#1BCBFF"/>
    <circle cx="1240" cy="150" r="150" fill="#7A5CFF"/>
    <circle cx="1380" cy="540" r="160" fill="#1D7BFF"/>
  </g>

  <rect x="74" y="78" width="1452" height="564" rx="28" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08"/>

  <rect x="112" y="118" width="190" height="36" rx="18" fill="#102E54"/>
  <text x="207" y="141" fill="#8FE2FF" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">AI-READY REVIT PLATFORM</text>

  <text x="112" y="238" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="72" font-weight="800">BIM765T</text>
  <text x="112" y="322" fill="#D8E8FF" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="700">Revit Bridge Platform</text>
  <text x="112" y="392" fill="#B6C9E8" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="400">Safe Revit automation, project understanding, and agent-ready BIM workflows.</text>

  <g>
    <rect x="112" y="446" width="232" height="54" rx="27" fill="url(#accent)"/>
    <text x="228" y="480" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="800" text-anchor="middle">Project Brain</text>

    <rect x="362" y="446" width="214" height="54" rx="27" fill="#123961" stroke="#2A77C9"/>
    <text x="469" y="480" fill="#D8E8FF" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">WorkerHost + MCP</text>
  </g>

  <g>
    <rect x="894" y="156" width="510" height="320" rx="24" fill="#0C1F38" stroke="#1B4C7A"/>
    <rect x="930" y="193" width="168" height="40" rx="20" fill="#143A63"/>
    <text x="1014" y="219" fill="#91D8FF" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">CONTROL PLANE</text>

    <rect x="930" y="258" width="438" height="48" rx="14" fill="#102947"/>
    <text x="955" y="289" fill="#E8F2FF" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Web / CLI / MCP / Worker UX</text>

    <path d="M1149 313L1149 347" stroke="#4FB5FF" stroke-width="4" stroke-linecap="round" stroke-dasharray="6 8"/>

    <rect x="930" y="354" width="438" height="54" rx="14" fill="#13365E"/>
    <text x="955" y="388" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">WorkerHost orchestration</text>

    <path d="M1149 415L1149 448" stroke="#8A7CFF" stroke-width="4" stroke-linecap="round" stroke-dasharray="6 8"/>

    <rect x="930" y="455" width="438" height="54" rx="14" fill="#1A2856"/>
    <text x="955" y="489" fill="#F0EDFF" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Private Revit kernel + ExternalEvent</text>
  </g>

  <g>
    <rect x="112" y="560" width="180" height="32" rx="16" fill="#102947"/>
    <text x="202" y="581" fill="#8DD8FF" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="middle">Preview -> Approve -> Execute</text>

    <rect x="304" y="560" width="196" height="32" rx="16" fill="#102947"/>
    <text x="402" y="581" fill="#8DD8FF" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="middle">Context Engine</text>

    <rect x="512" y="560" width="184" height="32" rx="16" fill="#102947"/>
    <text x="604" y="581" fill="#8DD8FF" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="middle">Evidence + Memory</text>
  </g>
</svg>
